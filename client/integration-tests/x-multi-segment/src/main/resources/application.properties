# OpenAPI Generator configuration
quarkus.openapi-generator.codegen.spec.github_api_yaml.base-package=io.quarkiverse.openapi.generator.it.multisegment.api

# REST client configuration - point to local mock server (same as Quarkus test server)
quarkus.rest-client.github_api_yaml.url=http://localhost:8081

# Authentication - use bearer token
quarkus.openapi-generator.github_api_yaml.auth.bearerAuth.bearer-token=test-token-123

# Disable Keycloak dev services
quarkus.keycloak.devservices.enabled=false
