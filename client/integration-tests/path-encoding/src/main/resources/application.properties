# OpenAPI Generator configuration
quarkus.openapi-generator.codegen.spec.path_encoding_api_yaml.base-package=io.quarkiverse.openapi.generator.it.pathencoding.api
quarkus.openapi-generator.codegen.spec.path_encoding_api_yaml.enable-security-generation=false

# REST client configuration - point to local mock server (same as Quarkus test server)
quarkus.rest-client.path_encoding_api_yaml.url=http://localhost:8080

# Disable Keycloak dev services (no Docker needed)
quarkus.keycloak.devservices.enabled=false

# Set test port to 8080 (default is 8081)
quarkus.http.test-port=8080
