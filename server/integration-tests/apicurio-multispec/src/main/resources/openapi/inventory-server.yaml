openapi: 3.0.3
info:
  title: Inventory API
  version: 1.0.0
paths:
  /inventory:
    get:
      operationId: listInventory
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
components:
  schemas:
    Product:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
